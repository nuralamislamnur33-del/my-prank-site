<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SYSTEM CRITICAL ALERT ⚡</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        #header { color: red; font-weight: bold; text-align: center; font-size: 1.2rem; text-shadow: 0 0 10px red; margin-bottom: 15px; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
        #terminal { background: rgba(0, 20, 0, 0.9); border: 1px solid #0f0; padding: 15px; height: 65vh; overflow-y: hidden; box-shadow: 0 0 20px #0f0; border-radius: 10px; font-size: 0.9rem; position: relative; }
        .line { margin-bottom: 5px; }
        .danger { color: #ff0000; font-weight: bold; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #0f0; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        #click-me { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; border: 2px solid white; padding: 10px; background: rgba(255,0,0,0.5); z-index: 10; font-weight: bold; }
    </style>
</head>
<body onclick="startHack()">

    <div id="click-me">CLICK TO REPAIR SYSTEM</div>

    <div id="header">⚠️ DEVICE OVERHEATING - SYSTEM BREACHED ⚠️</div>
    
    <div id="terminal">
        <div id="log"></div>
        <span class="cursor"></span>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const clickMe = document.getElementById('click-me');
        const messages = [
            "> Initializing Cyber-Link v4.0...",
            "> Connection established with Master Server",
            "> <span class='danger'>Bypassing Security... 100%</span>",
            "> Accessing Internal Storage... [GRANTED]",
            "> Downloading Private Data...",
            "> <span class='danger'>DELETING SYSTEM FILES...</span>",
            "> Remote Microphone: LISTENING...",
            "> Uploading Contacts to DarkNet...",
            "> <span class='danger'>HARDWARE ENCRYPTION STARTED...</span>",
            "> STATUS: DEVICE CAPTURED."
        ];

        let index = 0;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(freq, duration) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.1;
            osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        function startHack() {
            // সাউন্ড অ্যাক্টিভেট করা
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // ফুল স্ক্রিন করা
            let doc = window.document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();

            // বোতাম লুকিয়ে ফেলা
            clickMe.style.display = 'none';
            
            if (index === 0) {
                runLines();
            }
        }

        function runLines() {
            if (index < messages.length) {
                const line = document.createElement('div');
                line.className = 'line';
                line.innerHTML = messages[index];
                logElement.appendChild(line);
                
                // ভাইব্রেশন ও বিপ
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                playBeep(600, 100);

                index++;
                setTimeout(runLines, 800);
            }
        }

        // ব্যাক বাটন ব্লক
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            if (navigator.vibrate) navigator.vibrate(500);
            alert("FATAL ERROR: System is Locked!");
        };
    </script>
</body>
</html>
