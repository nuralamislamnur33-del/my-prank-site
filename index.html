<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SYSTEM CRITICAL ALERT ⚡</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #header { color: red; font-weight: bold; text-align: center; font-size: 1.2rem; text-shadow: 0 0 10px red; margin-bottom: 15px; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
        #terminal { background: rgba(0, 20, 0, 0.9); border: 1px solid #0f0; padding: 15px; height: 65vh; overflow-y: hidden; box-shadow: 0 0 20px #0f0; border-radius: 10px; font-size: 0.9rem; }
        .line { margin-bottom: 5px; }
        .danger { color: #ff0000; font-weight: bold; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #0f0; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="startHack()">

    <div id="header">⚠️ DEVICE OVERHEATING - SYSTEM BREACHED ⚠️</div>
    
    <div id="terminal">
        <div id="log"></div>
        <span class="cursor"></span>
    </div>

    <p style="text-align: center; font-size: 0.7rem; color: #333;">Critical Error: Protocol 0x8892</p>

    <script>
        const logElement = document.getElementById('log');
        const messages = [
            "> Initializing Cyber-Link v4.0...",
            "> Connection established with Master Server",
            "> <span class='danger'>Bypassing Android Security Patch... 100%</span>",
            "> Accessing Internal Storage... [GRANTED]",
            "> Downloading DCIM/Camera/IMG_0492.jpg...",
            "> <span class='danger'>DELETING SYSTEM32 FILES...</span>",
            "> Remote Microphone: <span style='color:white'>LISTENING...</span>",
            "> Uploading Contacts to DarkNet... [DONE]",
            "> Overriding Touch Controls...",
            "> <span class='danger'>HARDWARE ENCRYPTION STARTED...</span>",
            "> ERROR: Battery Thermal Runaway imminent!",
            "> Remote Access: ADMIN CONTROL GRANTED",
            "> STATUS: DEVICE CAPTURED."
        ];

        let index = 0;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // বিপ সাউন্ড তৈরির ফাংশন
        function playBeep(freq, duration) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.1;
            osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        function startHack() {
            // ফুল স্ক্রিন করা
            let doc = window.document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            
            if (index === 0) {
                runLines();
            }
        }

        function runLines() {
            if (index < messages.length) {
                const line = document.createElement('div');
                line.className = 'line';
                line.innerHTML = messages[index];
                logElement.appendChild(line);
                
                // ভাইব্রেশন এবং শব্দ (মাঝে মাঝে)
                if (index % 3 === 0) {
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    playBeep(440, 200);
                }

                const terminal = document.getElementById('terminal');
                terminal.scrollTop = terminal.scrollHeight;
                
                index++;
                setTimeout(runLines, Math.random() * 800 + 400);
            }
        }

        // ব্যাক বাটন ব্লক
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            if (navigator.vibrate) navigator.vibrate(500);
            alert("FATAL ERROR: Navigation Blocked! Remote Access Active.");
        };
    </script>
</body>
</html>
